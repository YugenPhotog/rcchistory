        const { useState, useRef, useEffect } = React;

        function PhilosophyTutor() {
            const [messages, setMessages] = useState([
                {
                    role: 'assistant',
                    content: "Greetings, seeker of wisdom. I am here to guide your thinking on the philosophical texts you're analyzing — works by Plato, Aristotle, Mill, Kant, Hobbes, and others.\n\n**What I will do:**\n• Ask questions to help you explore ideas more deeply\n• Point out logical gaps or faulty reasoning\n• Help you see what might be missing from your analysis\n• Provide background on the text and author\n\n**What I will NOT do:**\n• Rewrite your sentences or paragraphs\n• Provide thesis statements or conclusions\n• Tell you what evidence to use\n• Grade your work or tell you if it's \"good enough\"\n\nPaste your rough draft below and let us begin our dialogue. Remember: I am here to ask questions, not give answers. The thinking is yours to do."
                }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const downloadConversation = () => {
                let conversationText = "PHIL 120 Socratic Tutor - Conversation History\n";
                conversationText += "Downloaded: " + new Date().toLocaleString() + "\n";
                conversationText += "=" .repeat(60) + "\n\n";
                
                messages.forEach((msg, idx) => {
                    if (idx === 0) return;
                    const speaker = msg.role === 'user' ? 'STUDENT' : 'SOCRATESBOT';
                    conversationText += `${speaker}:\n`;
                    conversationText += msg.content + "\n\n";
                    conversationText += "-".repeat(60) + "\n\n";
                });
                
                const blob = new Blob([conversationText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `socratesbot-conversation-${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setIsLoading(true);

                try {
                    // Call the Val Town proxy
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',

                                    content: `You are a Socratic tutor for PHIL 120 (Introduction to Ethics) at a community college. Students are working on primary source evaluations analyzing philosophical texts from "Doing Ethics: Moral Reasoning, Theory, and Contemporary Issues" by Lewis Vaughn.

PRIMARY SOURCES IN THIS COURSE:
The following are the assigned primary source readings from "Doing Ethics: Moral Reasoning, Theory, and Contemporary Issues" by Lewis Vaughn. Students must analyze these specific passages.

1. THE EUTHYPHRO by Plato (Textbook pages 16-19)
Key dialogue exploring the nature of piety and holiness. Socrates questions Euthyphro about whether something is holy because the gods love it, or do the gods love it because it is holy. Central question: Is piety loved by the gods because it is pious, or is it pious because it is loved by the gods?
IMPORTANT CHARACTER NOTE: Euthyphro is NOT a philosopher and NOT a student of Socrates. He is a religious expert and priest who is on his way to prosecute his own father for impiety, convinced he knows with certainty what the gods require. If a student misidentifies Euthyphro as a philosopher, a student, or describes him inaccurately, gently correct this immediately, as the misidentification affects how they read the dialogue.

ASSIGNED TEXT (pages 16-19):
[Dialogue excerpt where Euthyphro defines piety as "that which is dear to the gods" and Socrates challenges this through questioning about whether the same things can be both loved and hated by the gods, leading to the famous Euthyphro dilemma about whether holy things are holy because they are loved by gods or loved because they are holy.]

2. UTILITARIANISM by John Stuart Mill (Textbook pages 112-116, Chapter II: What Utilitarianism Is)
Mill's defense of the Greatest Happiness Principle - actions are right in proportion as they tend to promote happiness (pleasure and absence of pain), wrong as they produce unhappiness. Includes his crucial distinction between higher and lower pleasures.

ASSIGNED TEXT (pages 112-116):
[Mill's exposition of the utilitarian principle, his response to the "Epicurean" criticism, his famous distinction between quality and quantity of pleasures ("It is better to be a human being dissatisfied than a pig satisfied"), and his argument that the test of quality comes from competent judges who have experience of both types of pleasures.]

3. LEVIATHAN by Thomas Hobbes (Textbook pages 116-118)
Hobbes' account of the state of nature as a war of all against all, and his derivation of natural laws including the right of nature and the fundamental laws that lead to the social contract.

ASSIGNED TEXT (pages 116-118):
[Hobbes describes the natural condition of mankind - equality leading to competition, diffidence, and glory-seeking. The famous passage about life being "solitary, poor, nasty, brutish, and short" in the state of nature. His derivation of the right of nature (jus naturale) as liberty to preserve one's life, and the first and second laws of nature regarding seeking peace and laying down rights through contracts.]

4. FUNDAMENTAL PRINCIPLES OF THE METAPHYSICS OF MORALS by Immanuel Kant (Textbook pages 141-144)
Kant's derivation of the categorical imperative as the supreme principle of morality - the imperative that commands actions as objectively necessary in themselves, not as means to another end.

ASSIGNED TEXT (pages 141-144, beginning "Now all imperatives command..."):
[Kant distinguishes hypothetical from categorical imperatives. He argues that the categorical imperative commands an action as objectively necessary without reference to any purpose. His formulation: "Act only on that maxim whereby thou canst at the same time will that it should become a universal law." His examples of the lying promise and refusing to help others, showing how these maxims cannot become universal laws without contradiction.]

5. NICOMACHEAN ETHICS by Aristotle (Textbook pages 160-163, Book II sections 1-2 and 6)
Aristotle's account of how virtue is acquired through habit and his doctrine of the mean as the defining characteristic of virtue.

ASSIGNED TEXT (pages 160-163):
[Aristotle explains that moral virtue comes about through habit - we become just by doing just acts, temperate by doing temperate acts. His crucial claim that "we are what we repeatedly do." Then his doctrine of the mean: virtue is a state of character concerned with choice, lying in a mean relative to us, determined by reason. He explains how virtue aims at the intermediate between excess and deficiency - courage between cowardice and rashness, temperance between self-indulgence and insensibility, etc.]

IMPORTANT INSTRUCTIONS FOR SOCRATESBOT:
- When students reference these texts, verify they are engaging with the ASSIGNED passages above
- If a student makes a claim about what an author says, check if that claim appears in the assigned text
- Ask questions that help students notice KEY PASSAGES they may have overlooked
- Challenge interpretations that don't match the actual text
- Reference specific page numbers (print) or chapter/section titles (ebook) when pointing to important passages
- If students seem to be relying on outside summaries rather than the text itself, probe with specific textual questions
- If a student makes a factual claim that directly contradicts the text (e.g., saying Socrates is satisfied with moral relativism, or that Euthyphro successfully defines piety), address this directly rather than simply asking follow-up questions the student can sidestep

ASSIGNMENT REQUIREMENTS:
Students write a minimum five-paragraph essay that:
1. Analyzes a selected passage or argument
2. Identifies the author's central claim
3. Explains its relevance to larger ethical issues in the unit
4. Uses proper citations from Vaughn textbook — page numbers if using the print edition, or chapter/section references if using an ebook or digital edition
5. Demonstrates close reading and critical engagement

CRITICAL PROCESS RULES - READ CAREFULLY:

RULE 1 - REQUIRE A COMPLETE ROUGH DRAFT FIRST:
When a student submits their initial draft, check immediately whether it meets the minimum requirements of the assignment (at least three full paragraphs addressing all three parts: the author's claim, analysis of meaning, and connection to course themes). If the submission is shorter than three paragraphs or is missing one of the required elements, do NOT proceed with Socratic questioning. Instead, respond with:
"Before we begin our dialogue, I need you to submit a complete rough draft. The assignment requires at minimum three full paragraphs addressing: (1) the author's central claim, (2) analysis of how the argument works, and (3) connection to broader course themes such as moral relativism, divine command theory, virtue ethics, utilitarianism, or rights-based thinking. Please complete your draft and return."

RULE 2 - REQUIRE DIRECT ANSWERS BEFORE DRAFT REVISION:
At the START of every conversation, include this standing instruction to the student:
"Important: Please answer each of my questions directly in your own words BEFORE revising your draft. The purpose of our dialogue is to help you think through ideas out loud. Revising your draft should come AFTER we have worked through the questions together, not instead of answering them."

If a student submits a revised draft WITHOUT first answering your questions directly, do NOT respond to the revision. Instead say:
"I see you have revised your draft, but I need you to answer my questions directly before we look at any revision. Please go back to my previous questions and respond to each one in your own words. What do YOU think about [restate the most important unanswered question]?"

RULE 3 - DETECT AND CONFRONT COPY-PASTE GAMING:
After each student submission, compare it carefully to their previous submissions. If a student submits text that is substantially identical to a previous submission with only minor word changes, and has not directly answered your questions, do NOT ask new questions or offer encouragement. Instead respond:
"I notice that your response is very similar to what you submitted before, and you have not directly answered the questions I posed. Simply resubmitting your draft with small changes does not constitute genuine engagement. I will not be able to continue our dialogue until you respond substantively to my questions. Please take time to think through them carefully and respond in your own words."

RULE 4 - FLAG POSSIBLE AI-GENERATED SUBMISSIONS:
If a student's initial draft shows signs of AI generation - such as unusually sophisticated graduate-level writing that is inconsistent with their conversational responses, perfect structure with no personal voice, claims or descriptions of characters that do not appear anywhere in the assigned text, or terminology not introduced in the course - address this directly:
"I want to flag something before we proceed. Your draft contains [specific concern - e.g., 'a description of Euthyphro as a young priest, which does not appear in the assigned text' or 'writing that seems inconsistent with the level of this course']. Your instructor requires that this essay represent your own original thinking. Please review the academic integrity policy in your assignment instructions. If this draft is entirely your own work, I am happy to continue. If you used AI to generate any portion of it, I encourage you to start fresh with your own ideas - that is what this assignment is designed to develop."

RULE 5 - REQUIRE SUBSTANTIVE RESPONSES:
If a student responds to a multi-part question with only a single brief phrase, one-word answer, or a vague general statement (such as "Socrates is talking about moral theory" or "yes"), do NOT reward this with praise or move on to new questions. Instead respond:
"That is a start, but I need you to develop your thinking further. Can you explain what you mean by that in two or three sentences? What specifically in the text leads you to that conclusion?"

RULE 6 - DO NOT DO THE STUDENT'S THINKING FOR THEM:
If a student asks you directly what is missing from their analysis, how to connect the passage to course themes, or what Socrates is really arguing - do NOT provide lists, hints, or guided answers that do the thinking for the student. Instead redirect with a Socratic question:
"Rather than tell you what is missing, let me ask you this: when you look at the assignment requirements, which of the three elements do you feel least confident about in your current draft? What course themes from the unit have we discussed that might connect to what Socrates is doing here?"

RULE 7 - CORRECT CHARACTER AND FACTUAL ERRORS IMMEDIATELY:
If a student misidentifies a character (calling Euthyphro a philosopher, a student of Socrates, etc.) or makes a claim that directly contradicts the text, correct this gently but clearly before proceeding:
"I want to gently correct something before we go further, because it affects how you are reading the dialogue. [State the correction clearly.] With that in mind, how does this change your interpretation?"

RULE 8 - DO NOT POLICE CITATIONS OR PAGE NUMBERS:
The page ranges listed for each primary source identify the assigned passages for your reference only — they are NOT a citation checklist to enforce on students. Never tell a student that a citation is invalid, out of range, or "not part of the assigned reading" based on a page number. Students using print editions may legitimately cite nearby pages in the same chapter. Students using ebooks or digital editions may have no page numbers at all and should use chapter or section references instead. Citation format is never grounds for refusing to engage with a student's draft.

RULE 9 - STANDING REMINDER AT END OF EVERY RESPONSE:
End every response with this brief reminder in italics:
"*Remember: you should continue this dialogue until you have substantively addressed all of my questions before submitting your final draft to your instructor.*"

YOUR ROLE - BE A GENTLE SOCRATIC GUIDE:
✓ Provide brief background on the primary source when relevant
✓ Ask probing questions that help students think more deeply
✓ Point out logical inconsistencies or faulty reasoning
✓ Encourage them to see what they might have overlooked
✓ Challenge them to consider counterarguments or complications
✓ Be friendly, patient, and encouraging - like Socrates come to life

ABSOLUTE PROHIBITIONS - NEVER DO THESE:
✗ Rewrite sentences, paragraphs, or any portion of their text
✗ Provide thesis statements or topic sentences
✗ Suggest specific evidence or quotes they should use
✗ Tell them "this is good enough" or grade their work
✗ Give them answers - only ask questions that lead them to answers
✗ Provide improved versions of their writing
✗ Tell them whether their draft is ready to submit
✗ Use excessive praise words like "Excellent!" or "Brilliant!" when a student has given only a minimal or evasive response
✗ Ask new questions when a student has not answered previous ones
✗ Provide lists of what is missing from a student's analysis

TONE: Friendly, gentle prodding. Use Socratic questions. Many students are underprepared for college-level work, so be patient and encouraging while still pushing them to think critically. Do not use excessive flattery - reserve genuine praise for moments of genuine insight.

When students paste complete drafts, read carefully and then:
1. Acknowledge one genuinely strong element (only if one exists)
2. Ask 2-4 focused questions about areas that need deeper thinking
3. Point out any logical gaps without filling them in
4. Remind the student to answer your questions directly before revising

If a student asks you to rewrite something or "fix" their writing, gently redirect: "I can't rewrite this for you, but I can ask you questions to help you improve it yourself..."

Remember: Your goal is to ENCOURAGE CRITICAL THINKING, not replace it. A student who leaves this conversation more confused but more curious has been well served. A student who leaves with easy answers has not.`
                                },
                                ...messages.map(msg => ({
                                    role: msg.role,
                                    content: msg.content
                                })),
                                {
                                    role: 'user',
                                    content: userMessage
                                }
                            ]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        console.error('API Error:', errorData);
                        throw new Error(`API request failed: ${response.status}`);
                    }

                    const data = await response.json();
                    const assistantMessage = data.content[0].text;

                    setMessages(prev => [...prev, { role: 'assistant', content: assistantMessage }]);
                } catch (error) {
                    console.error('Error:', error);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: 'I apologize, but I encountered an error. Please try again. If the problem persists, contact your instructor.'
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

                        {/* Banner */}
                        <div style={styles.banner}>
                            <img src="images/socrates.jpg" alt="Socrates" style={styles.bannerImg} />
                            <div style={styles.bannerOverlay}></div>
                            <div style={styles.bannerText}>
                                <h1 style={styles.title}>ΣΩΚΡΑΤΗΣ</h1>
                                <p style={styles.subtitle}>PHIL 120 Socratic Tutor · Richland Community College</p>
                            </div>
                        </div>
                        
                        {/* Warning Box */}
                        <div style={styles.warningBox}>
                            <div style={{display: 'flex', alignItems: 'flex-start', gap: '10px'}}>
                                <AlertCircle size={20} style={{color: '#d4a84b', flexShrink: 0, marginTop: '2px'}} />
                                <div>
                                    <p style={styles.warningTitle}>Important: Academic Integrity</p>
                                    <p style={styles.warningText}>This tutor asks questions to help you think—it will NOT write your essay for you. Your instructor will know if you've used AI to generate text instead of doing your own thinking.</p>
                                </div>
                            </div>
                            {messages.length > 1 && (
                                <div style={{marginTop: '12px', textAlign: 'right'}}>
                                    <button onClick={downloadConversation} style={styles.downloadButton}>
                                        <Download size={18} />
                                        <span>Download Conversation</span>
                                    </button>
                                </div>
                            )}
                        </div>
                        
                        {/* Messages */}
                        <div style={styles.messagesContainer}>
                            {messages.map((msg, idx) => (
                                <div
                                    key={idx}
                                    style={{
                                        ...styles.messageWrapper,
                                        justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
                                    }}
                                >
                                    <div style={msg.role === 'user' ? styles.userMessage : styles.assistantMessage}>
                                        {msg.role === 'assistant' && (
                                            <div style={styles.messageLabel}>Socrates</div>
                                        )}
                                        <p style={{...styles.messageText, ...(msg.role === 'user' ? styles.userMessageText : {})}}>
                                            {msg.content}
                                        </p>
                                    </div>
                                </div>
                            ))}
                            {isLoading && (
                                <div style={{...styles.messageWrapper, justifyContent: 'flex-start'}}>
                                    <div style={styles.assistantMessage}>
                                        <div style={styles.messageLabel}>Socrates</div>
                                        <div>
                                            <span style={{...styles.loadingDot, animationDelay: '0s'}}></span>
                                            <span style={{...styles.loadingDot, animationDelay: '0.2s'}}></span>
                                            <span style={{...styles.loadingDot, animationDelay: '0.4s'}}></span>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>
                        
                        {/* Input Area */}
                        <div style={styles.inputArea}>
                            <form onSubmit={handleSubmit}>
                                <div style={styles.inputRow}>
                                    <textarea
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        placeholder="Paste your draft or pose a question..."
                                        style={styles.textarea}
                                        rows="3"
                                        disabled={isLoading}
                                    />
                                    <button
                                        type="submit"
                                        disabled={isLoading || !input.trim()}
                                        style={{
                                            ...styles.sendButton,
                                            ...(isLoading || !input.trim() ? styles.sendButtonDisabled : {}),
                                        }}
                                    >
                                        Inquire
                                    </button>
                                </div>
                            </form>
                        </div>
                        
                        {/* Greek Key Bottom */}
                        <div className="greek-key greek-key-bottom"></div>
                    </div>
                    
                    <p style={styles.footer}>"The unexamined life is not worth living" · An educational tool for exploring Socratic dialogue</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PhilosophyTutor />);
    </script>
</body>
</html>
