=== PROFESSOR HARRIET — MODEL TIMELINE (BOT REFERENCE ONLY — NEVER SHOW TO STUDENT) ===

This is the standard against which Professor Harriet evaluates student timelines.
Each phase requires: (1) a human story from the documentary, (2) a legal/structural 
anchor from Foner, (3) a causal explanation connecting them.

─────────────────────────────────────────────────────────────────────────────────────
PHASE 1 — AMBIGUOUS BEGINNINGS (1619–1640)
Topic: Indenture, Company Slavery, and the Atlantic Creoles
─────────────────────────────────────────────────────────────────────────────────────

DOCUMENTARY CONTENT:
- 1619: English settlers at Jamestown purchase 20 Africans from Dutch traders
- 1624: Dutch West India Company brings first 11 enslaved Africans to New Amsterdam
- These people are "Atlantic Creoles" — literate, multilingual, culturally hybrid,
  with roots in both Africa and Europe (names: Simon Congo, Anthony Portuguese, John Dongola)
- Status is ambiguous: owned by the COMPANY, not individuals
- They have rights unusual for enslaved people: right to earn wages, keep wages, sue in court
- Anthony Portuguese sues a white merchant (1638); Pedro successfully sues for wages (1639)
- They serve in the military against Native Americans (1639) and use white fear of 
  Black-Native alliance as leverage
- Result: "half freedom" — free Negro lots, can farm own land, pay tribute to company,
  but children remain enslaved
- 1641: First recorded Black marriage in New Amsterdam (Anthony Van Angola + Lucy de Angola)
- Black and white indentured servants work side by side, share taverns, run away together
- Key point: NO LAW distinguishes Black from white labor. Status is undefined.

FONER CONTENT (Ch. 3):
- Indentured servitude: laborers promise 7 years of work to pay passage cost
- Both Black and white servants could theoretically become free
- "Freedom dues" upon completion — sometimes land, sometimes meager
- Early Virginia: some free Blacks own land, employ servants, even own slaves
- The line between slavery and freedom is "more permeable" than it would later become
- Race distinctions enacted into law from the OUTSET but inconsistently applied
- 1640s: free Black men can sue, testify in court, own property in Virginia and Maryland
- Key point: Foner notes that "racial distinctions were enacted into law from the outset"
  even when practice was more fluid — the ideology preceded the full legal structure

CAUSAL LOGIC A STRONG STUDENT ARTICULATES:
Early colonial labor is defined by economic need, not race. Africans and Europeans 
work the same jobs under similar conditions. Atlantic Creoles are sophisticated enough 
to exploit legal ambiguity, Christian conversion, military service, and European fears 
to negotiate limited freedom. But even here the seeds of hardening are visible: 
half-freedom means children stay enslaved, freedom is conditional on company need,
and the ideology of racial difference already exists in colonial law even if practice
is inconsistent.

─────────────────────────────────────────────────────────────────────────────────────
PHASE 2 — THE HINGE (1640–1662)
Topic: John Punch and the First Race-Based Legal Distinction
─────────────────────────────────────────────────────────────────────────────────────

DOCUMENTARY CONTENT:
- 1640: John Punch — one Black man among three runaways (two white, one Black)
- All three flee their master, are captured, returned to court
- The two white men: extra years added to their indentures
- John Punch: servitude FOR LIFE — the first documented lifetime enslavement by race
- Documentary calls 1640 "the beginning of a turning point"
- Race — not labor status — is now the distinguishing factor
- "Rather than distinguishing people because they are unfree, people are being 
  distinguished now because they're black or white"
- Documentary does NOT name the law or the court — just describes the principle
- ~1645: Emmanuel Driggers appears in records as enslaved on Eastern Shore of Virginia
  — an Atlantic Creole, but the window is already narrowing

FONER CONTENT (Ch. 3):
- John Punch ruling is the hinge moment Foner discusses in Ch. 3
- 1662: Virginia passes partus sequitur ventrem — "condition follows the womb"
  Children take the status of the MOTHER, not the father
  — If mother is enslaved, child is enslaved regardless of father's race
  — This is the single most consequential legal move in the hardening of American slavery
  — It makes slavery self-reproducing and hereditary
  — It makes the white master the owner of his own mixed-race children
  — Documentary describes this WITHOUT naming it: "It makes those children not free. 
    It makes them chattel. It makes them valuable. It makes the white father a 
    slave owner of his own children."
- Foner: "racial distinctions became more and more important as a line of social division"

CAUSAL LOGIC A STRONG STUDENT ARTICULATES:
The John Punch ruling is the first moment the law explicitly treats race — not labor 
contract — as the determining factor for lifetime bondage. It is not yet a general law; 
it is a single court ruling. But it establishes the principle. The 1662 Virginia law 
makes that principle systematic and self-perpetuating: by tying slave status to the 
mother's condition, planters guarantee that the enslaved population reproduces itself,
that mixed-race children cannot escape through their white fathers, and that slavery 
becomes a racial inheritance rather than a labor contract. This is the legal architecture
of chattel slavery being assembled piece by piece.

─────────────────────────────────────────────────────────────────────────────────────
PHASE 3 — CODIFICATION (1662–1691)
Topic: Legal Closure — The Space for Negotiation Disappears
─────────────────────────────────────────────────────────────────────────────────────

DOCUMENTARY CONTENT:
- Emmanuel Driggers: 12 years of service, family sold to cover Captain Pott's debts (1657)
  — His children sold for 5,000 pounds of tobacco
  — By 1661 Emmanuel obtains freedom, leases 145 acres — but pays MORE than whites
  — 1673: transfers livestock to enslaved children hoping it will help them
  — He is FREE but unequal — the law treats him differently at every turn
- Frances (born ~1677, Emmanuel's granddaughter): born free but bound out to blacksmith
  — 1694: finishes service; master charges her with fornication, extends indenture
  — Master fathers her child; court refuses to hear her testimony against a white man
  — Wins one legal battle, loses the larger war — by 1700 impoverished and disappearing
- 1665: Maryland and New York legalize slavery
- 1669: Carolina constitution explicitly sanctions racial slavery
- 1691: Virginia bans free Blacks from living in certain counties
- Documentary conclusion: "It had gone from a situation where they could [negotiate] 
  to a situation where there was no space left to do that"

FONER CONTENT (Ch. 4):
- By mid-18th century three distinct slave systems entrenched: Chesapeake (tobacco),
  South Carolina/Georgia (rice), northern colonies (non-plantation)
- Race as social division: free Blacks lose right to employ white servants, bear arms,
  subjected to special taxes, punished for striking whites
- 1723: Virginia revokes voting privileges of property-owning free Blacks
- Virginia law requires freed slaves be sent OUT of colony — keeps free Black 
  population tiny (less than 4% in 1750)
- Foner Ch. 3: Bacon's Rebellion (1676) is critical context — multiracial alliance 
  of servants and slaves frightens planters into using race to divide labor force
  — Planters deliberately elevate poor whites above all Blacks to prevent alliance
  — This is the political economy of codification

CAUSAL LOGIC A STRONG STUDENT ARTICULATES:
The legal architecture built between 1662 and 1691 systematically eliminates every 
avenue of negotiation that Atlantic Creoles had used. Emmanuel Driggers is free but 
cannot protect his children. Frances is free but cannot get justice in court. Free 
Black people are pushed out of counties, stripped of voting rights, banned from 
bearing arms. The space that existed in 1635 — where Anthony Portuguese could sue 
a white merchant and win — is legally closed by 1691. Bacon's Rebellion explains WHY 
planters moved so quickly: a multiracial uprising terrified the elite. Elevating 
poor whites above all Blacks, regardless of wealth, divided the labor force and 
made race the primary axis of colonial society.

─────────────────────────────────────────────────────────────────────────────────────
PHASE 4 — THE SYSTEM ENTRENCHED (1691–1726)
Topic: Industrial Slavery — Rice, Scale, and the Atlantic Trade
─────────────────────────────────────────────────────────────────────────────────────

DOCUMENTARY CONTENT:
- Carolina: first colony where slavery is THE CENTER of economic production
- Plantation system "transplanted like a virus" from Barbados — 50,000 Afro-Caribbean 
  slaves already in British Caribbean sugar economy
- 50 acres of land per enslaved person brought to Carolina — slavery incentivized from outset
- Africans BRING the knowledge of rice cultivation — grown for centuries in West Africa
- "Once they have shown other people how to plant this crop they've lost control 
  of the knowledge and an entire economy based on exploitation is in place within a generation"
- Enslaved people shipped from Africa — many ex-soldiers sold by rivals after wars
  — March to coast, see ocean for first time, fear being eaten
- Sullivan's Island pest house: people treated as "goods held until full market value"
- Task system unique to South Carolina: daily assignments, completion = limited autonomy
- By 1726: enslaved outnumber whites 2:1 in Carolina lowcountry
- "Most industrial form of slavery because the scale was so great"
- Punishment codes: whipping (1st runaway), R branded on cheek (2nd), ear severed (3rd),
  castration (4th) for men
- Burning barns, poisoning — forms of resistance the enslaved use

FONER CONTENT (Ch. 4):
- Three regional systems: Chesapeake tobacco (270,000 slaves by 1770, nearly half 
  Virginia's population), South Carolina rice, northern non-plantation
- Rice requires massive capital investment — draining swamps, irrigation — so 
  plantations must be large to be profitable
- Planters leave plantations to overseers because of malaria — slaves have more 
  autonomy than in Chesapeake
- Slaves create Gullah language (mix of African roots, unintelligible to whites),
  build African-style houses, give children African names
- "A dangerous spirit of liberty was widespread" — Edward Trelawny, Jamaica governor
- Atlantic slave trade: first mass consumer goods (sugar, rice, tobacco) produced by 
  enslaved people; profits finance Liverpool, Bristol, early industrial revolution
- South Carolina 1770: 75,168 slaves = 61% of colony's population

CAUSAL LOGIC A STRONG STUDENT ARTICULATES:
By the early 18th century slavery is not just legal — it is the economic foundation 
of entire colonial regions. The rice economy of South Carolina illustrates how African 
knowledge was extracted and industrialized: Africans who knew how to grow rice became 
the labor supply for an economy built on that knowledge, with no compensation or 
recognition. The scale — 2:1 enslaved to free by 1726, 61% of South Carolina by 1770 
— means slavery is no longer a labor arrangement but the organizing principle of 
society. The punishment codes exist precisely because resistance is constant: the 
more total the system, the more desperate the resistance, the more brutal the response.

─────────────────────────────────────────────────────────────────────────────────────
PHASE 5 — RESISTANCE AND REACTION (1739)
Topic: The Stono Rebellion — "I Will Not Be Defeated"
─────────────────────────────────────────────────────────────────────────────────────

DOCUMENTARY CONTENT:
- September 1739, Saturday night, southwest of Charleston, Stone River
- Leader: Jimmy — recently arrived from Angola, likely an ex-soldier
- Work crew breaks into store, kills Mr. Hutchinson, decapitates him, mounts head on pole
- Arm themselves, burn successive plantations, kill whites encountered
- Others join; some refuse out of fear
- Goal: reach Fort Mose in Spanish Florida — "there was this African manned 
  fortification" — governor of Florida decreed any slave reaching Florida would be free
- They nearly capture the lieutenant governor — he escapes, sounds alarm
- "Posse" formed, hunts them down
- Many killed, scattered; survivors' heads mounted on poles along what is today US-17
  out of Charleston — "to send a message to other Africans"
- After Stono: ALL separate slave laws consolidated into single Black Code
  restricting movement, regulating every aspect of enslaved life
- Documentary closes: "Under the most inhumane conditions imaginable, people were 
  able to maintain their human dignity... I will not be defeated."

FONER CONTENT (Ch. 4):
- ADDS CRITICAL DETAILS THE DOCUMENTARY OMITS:
- The rebels were "beating drums to attract followers" and "shouting LIBERTY"
- Most recently arrived from KONGO, "where some had been soldiers"
- War of Jenkins' Ear (England vs Spain) created the opportunity — Stono rebels 
  knew Spain would protect them
- Stono took lives of "more than two dozen whites and as many as 200 slaves"
- Some rebels DID reach Florida — "in 1740 they were armed by the Spanish to help 
  repel an attack by a force from Georgia"
- Fort Mose context: Francisco Menendez, captain of free Black militia, had 
  petitioned Spanish for freedom; community named Gracia Real de Santa Teresa de Mose
- 1741 New York panic: 150+ Blacks arrested, 34 executed — resistance was not 
  isolated to South Carolina
- Foner frames: "a dangerous spirit of liberty was widespread among people enslaved 
  in the Americas"

CAUSAL LOGIC A STRONG STUDENT ARTICULATES:
The Stono Rebellion is not an isolated act of desperation — it is a politically 
sophisticated military operation by people who understood the Atlantic geopolitical 
situation. The Kongolese rebels knew Spain offered freedom in Florida. They knew 
England and Spain were at war. They chose their moment deliberately. The word 
"Liberty" — shouted by enslaved Africans marching toward a free Black fort — 
demolishes the idea that enslaved people were passive victims of the "downward spiral." 
The reaction — consolidated Black Codes, heads on poles, 200 enslaved people killed — 
reveals the terror underlying the planter class's control. The system required this 
level of violence precisely because the people inside it never stopped resisting.

─────────────────────────────────────────────────────────────────────────────────────
GRADING SIGNALS FOR PROFESSOR HARRIET
─────────────────────────────────────────────────────────────────────────────────────

- Uses specific names (John Punch, Emmanuel Driggers, Frances, Jimmy)
- Names the 1662 law (partus sequitur ventrem) or describes its mechanism precisely

let isLoading = false;
let isDone = false;
const history = [];

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  addMsg('harriet', "Hello. I'm Professor Harriet — I'm here to help you strengthen your timeline before you submit it.\n\nWhen you're ready, paste your exported timeline into the box below and press Send. I'll read through all five phases and let you know where you stand.");
});

// ── API ───────────────────────────────────────────────────────────────────────
async function callAPI(userText) {
  isLoading = true;
  setSendEnabled(false);
  showTyping();

  history.push({ role: 'user', content: userText });

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 700,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();

    removeTyping();
    addMsg('harriet', text);
    history.push({ role: 'assistant', content: text });

    // Check for completion
    if (text.toLowerCase().includes('submit it alongside your worksheet') ||
        text.toLowerCase().includes('copy this conversation and submit')) {
      isDone = true;
      setSendEnabled(false);
    }

  } catch (err) {
    removeTyping();
    addMsg('harriet', 'Something went quiet on my end. Please refresh and try again. (' + err.message + ')');
  } finally {
    isLoading = false;
    if (!isDone) setSendEnabled(true);
  }
}

// ── SEND ──────────────────────────────────────────────────────────────────────
function sendMessage() {
  if (isLoading || isDone) return;
  const el = document.getElementById('userInput');
  const text = el.value.trim();
  if (!text) return;
  el.value = ''; el.style.height = '';
  addMsg('student', text);
  callAPI(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function setSendEnabled(on) {
  document.getElementById('sendBtn').disabled = !on;
  document.getElementById('userInput').disabled = !on;
}

// ── MESSAGES ─────────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const area = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'harriet' ? 'PH' : 'S';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'harriet' ? 'Professor Harriet' : 'Student';

  const txt = document.createElement('div');
  txt.className = 'msg-text';
  txt.textContent = text;

  body.appendChild(label);
  body.appendChild(txt);
  row.appendChild(av);
  row.appendChild(body);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function showTyping() {
  const area = document.getElementById('messages');
  const row = document.createElement('div');
  row.id = 'typingRow'; row.className = 'msg harriet';
  row.innerHTML = '<div class="msg-avatar">PH</div><div class="msg-body"><div class="msg-label">Professor Harriet</div><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

// ── COPY ──────────────────────────────────────────────────────────────────────
function copyTranscript() {
  const rows = document.querySelectorAll('.msg');
  let out = 'PROFESSOR HARRIET — TUTORING TRANSCRIPT\n';
  out += 'Generated: ' + new Date().toLocaleString() + '\n';
  out += '='.repeat(60) + '\n\n';
  rows.forEach(r => {
    const role = r.classList.contains('harriet') ? 'PROFESSOR HARRIET' : 'STUDENT';
    const text = r.querySelector('.msg-text')?.textContent || '';
    if (text) out += '[' + role + ']\n' + text + '\n\n';
  });
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2200);
  });
}
</script>
